<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - AlumniSphere</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#020617,#020617,#010314);
    overflow:hidden;
}

/* Animated background */

body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(circle,#4f46e5,#06b6d4);
    filter:blur(200px);
    animation:moveBg 10s infinite alternate;
}

@keyframes moveBg{
    from{ transform:translate(-100px,-100px); }
    to{ transform:translate(200px,150px); }
}

/* Container */

.container{
    width:850px;
    height:520px;
    background:rgba(255,255,255,0.05);
    border-radius:25px;
    backdrop-filter:blur(20px);
    display:flex;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 0 40px rgba(79,70,229,0.4);
    position:relative;
}

/* Left Side */

.left{
    flex:1;
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
    color:white;
}

.left h1{
    margin-bottom:15px;
}

.left p{
    opacity:0.9;
}

/* Right Side */

.right{
    flex:1;
    padding:40px;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* Tabs */

.tabs{
    display:flex;
    gap:20px;
    margin-bottom:25px;
}

.tabs button{
    background:none;
    border:none;
    color:#94a3b8;
    font-size:16px;
    cursor:pointer;
    position:relative;
}

.tabs button.active{
    color:white;
}

.tabs button.active::after{
    content:"";
    position:absolute;
    width:100%;
    height:2px;
    background:#6366f1;
    bottom:-5px;
    left:0;
}

/* Form */

.form{
    display:none;
    flex-direction:column;
    gap:15px;
}

.form.active{
    display:flex;
}

input{
    padding:14px;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
}

button.submit-btn{
    padding:14px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#4f46e5,#06b6d4);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button.submit-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(79,70,229,0.4);
}

/* Glow border animation */

.container::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:25px;
    padding:2px;

    background:linear-gradient(45deg,#4f46e5,#06b6d4,#22c55e,#f59e0b);

    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);

    -webkit-mask-composite:xor;
    mask-composite:exclude;

    animation:borderGlow 4s linear infinite;

    pointer-events:none;   /* ⭐ THIS FIXES CLICK ISSUE */
}


@keyframes borderGlow{
    0%{ filter:hue-rotate(0deg); }
    100%{ filter:hue-rotate(360deg); }
}

</style>
</head>
<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h1>Welcome 🎓</h1>
        <p>Join AlumniSphere and connect with alumni worldwide.</p>
    </div>

    <!-- RIGHT -->
    <div class="right">

        <div class="tabs">
            <button id="loginTab" class="active">Login</button>
            <button id="signupTab">Signup</button>
        </div>

        <!-- LOGIN FORM -->
        <form class="form active" id="loginForm">
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button class="submit-btn">Login</button>
        </form>

        <!-- SIGNUP FORM -->
        <form class="form" id="signupForm">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button class="submit-btn">Create Account</button>
        </form>

    </div>

</div>

<script>

const loginTab = document.getElementById("loginTab");
const signupTab = document.getElementById("signupTab");

const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");

loginTab.onclick = () => {
    loginTab.classList.add("active");
    signupTab.classList.remove("active");

    loginForm.classList.add("active");
    signupForm.classList.remove("active");
}

signupTab.onclick = () => {
    signupTab.classList.add("active");
    loginTab.classList.remove("active");

    signupForm.classList.add("active");
    loginForm.classList.remove("active");
}

</script>

</body>
</html>
